<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- コンセプト: 左右比較画面（アプリのスクリーンショット風UI） -->
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3a5a"/>
      <stop offset="100%" stop-color="#1a2438"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3C5A8C"/>
      <stop offset="100%" stop-color="#2a4070"/>
    </linearGradient>
    <filter id="sh9" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#00000060"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" rx="40" fill="url(#bg9)"/>

  <!-- ウィンドウフレーム -->
  <rect x="22" y="40" width="212" height="160" rx="10" fill="#f0f2f8" filter="url(#sh9)"/>

  <!-- タイトルバー -->
  <rect x="22" y="40" width="212" height="26" rx="10" fill="url(#titleBar)"/>
  <rect x="22" y="54" width="212" height="12" fill="url(#titleBar)"/>
  <!-- ウィンドウコントロール -->
  <circle cx="40" cy="53" r="5" fill="#ff5f57"/>
  <circle cx="56" cy="53" r="5" fill="#ffbd2e"/>
  <circle cx="72" cy="53" r="5" fill="#28c840"/>
  <!-- タイトル -->
  <text x="144" y="57" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="700" fill="white" opacity="0.9">NIMONO — 似物</text>

  <!-- 左ペイン -->
  <rect x="26" y="70" width="96" height="80" rx="4" fill="white"/>
  <rect x="26" y="70" width="96" height="80" rx="4" fill="none" stroke="#3C5A8C" stroke-width="1.5"/>
  <!-- 左画像 -->
  <rect x="28" y="72" width="92" height="55" rx="3" fill="#c8d8f0"/>
  <circle cx="100" cy="87" r="10" fill="#f5c842"/>
  <polygon points="30,122 50,98 72,122" fill="#3C783C"/>
  <polygon points="52,122 76,92 100,122" fill="#4a9a4a" opacity="0.8"/>
  <!-- 左情報 -->
  <rect x="28" y="130" width="50" height="5" rx="2" fill="#c0c8d8"/>
  <rect x="28" y="139" width="70" height="4" rx="2" fill="#c0c8d8"/>
  <rect x="28" y="147" width="60" height="4" rx="2" fill="#c0c8d8"/>

  <!-- 中央スプリッター -->
  <rect x="126" y="70" width="4" height="80" fill="#d0d0d8"/>

  <!-- 右ペイン -->
  <rect x="134" y="70" width="96" height="80" rx="4" fill="white"/>
  <rect x="134" y="70" width="96" height="80" rx="4" fill="none" stroke="#3C783C" stroke-width="1.5"/>
  <!-- 右画像（似た構図） -->
  <rect x="136" y="72" width="92" height="55" rx="3" fill="#c0d0e8"/>
  <circle cx="208" cy="87" r="10" fill="#f5c842"/>
  <polygon points="138,122 158,98 180,122" fill="#3C5A8C"/>
  <polygon points="160,122 184,92 208,122" fill="#4a6aaa" opacity="0.8"/>
  <!-- 右情報 -->
  <rect x="136" y="130" width="50" height="5" rx="2" fill="#c0c8d8"/>
  <rect x="136" y="139" width="70" height="4" rx="2" fill="#c0c8d8"/>
  <rect x="136" y="147" width="60" height="4" rx="2" fill="#c0c8d8"/>

  <!-- 類似度バー（下部） -->
  <rect x="26" y="155" width="206" height="14" rx="4" fill="#e0e4f0"/>
  <rect x="26" y="155" width="174" height="14" rx="4" fill="#3C5A8C" opacity="0.7"/>
  <text x="222" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="#3C5A8C">92%</text>

  <!-- アプリ名 -->
  <text x="128" y="224" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" letter-spacing="4">NIMONO</text>
  <text x="128" y="244" text-anchor="middle" font-family="serif" font-size="12" fill="white" opacity="0.55" letter-spacing="2">似物</text>
</svg>
