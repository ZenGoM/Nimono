<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- コンセプト: ミニマル／フラットデザイン。土鍋のシルエット＋「似」の字 -->
  <defs>
    <linearGradient id="bg_n04" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3C2010"/>
      <stop offset="100%" stop-color="#1e0e06"/>
    </linearGradient>
    <filter id="glow_n04">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" rx="40" fill="url(#bg_n04)"/>

  <!-- 装飾円 -->
  <circle cx="128" cy="128" r="105" fill="none" stroke="#e0a060" stroke-width="1" opacity="0.2"/>
  <circle cx="128" cy="128" r="90" fill="none" stroke="#e0a060" stroke-width="0.5" opacity="0.15"/>

  <!-- 鍋シルエット（フラット・シンプル）-->
  <!-- 鍋底 -->
  <path d="M50,180 Q50,215 128,218 Q206,215 206,180 L206,140 Q206,128 195,125 L61,125 Q50,128 50,140 Z"
        fill="#e09040" opacity="0.9"/>
  <!-- 鍋の口縁 -->
  <rect x="46" y="120" width="164" height="14" rx="7" fill="#c07030"/>

  <!-- 取っ手 -->
  <rect x="22" y="130" width="30" height="12" rx="6" fill="#c07030"/>
  <rect x="204" y="130" width="30" height="12" rx="6" fill="#c07030"/>

  <!-- 蓋 -->
  <ellipse cx="128" cy="120" rx="86" ry="16" fill="#d08040"/>
  <!-- つまみ -->
  <rect x="114" y="100" width="28" height="22" rx="10" fill="#d08040"/>
  <circle cx="128" cy="100" r="10" fill="#c07030"/>

  <!-- 鍋の中に漢字「似」をグロー表示 -->
  <text x="128" y="192" text-anchor="middle"
        font-family="'Yu Mincho', '游明朝', serif"
        font-size="68" font-weight="700"
        fill="#2a1008"
        opacity="0.5">似</text>
  <text x="128" y="192" text-anchor="middle"
        font-family="'Yu Mincho', '游明朝', serif"
        font-size="68" font-weight="700"
        fill="#fff0d8"
        opacity="0.85"
        filter="url(#glow_n04)">似</text>

  <!-- 湯気（シンプルなウェーブライン） -->
  <path d="M90,102 Q86,88 90,76 Q94,64 90,52" fill="none" stroke="#e0a060" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M128,98 Q124,84 128,72 Q132,60 128,48" fill="none" stroke="#e0a060" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <path d="M166,102 Q170,88 166,76 Q162,64 166,52" fill="none" stroke="#e0a060" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- アプリ名 -->
  <text x="128" y="235" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#e0a060" letter-spacing="4" filter="url(#glow_n04)">NIMONO</text>
  <text x="128" y="252" text-anchor="middle" font-family="serif" font-size="11" fill="#c07030" opacity="0.8" letter-spacing="3">煮物 / 似物</text>
</svg>
