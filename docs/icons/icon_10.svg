<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- コンセプト: 指紋＋写真（個性・識別・類似性のメタファー） -->
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EBEBF0"/>
      <stop offset="100%" stop-color="#c8c8d8"/>
    </linearGradient>
    <linearGradient id="photoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3C5A8C"/>
      <stop offset="100%" stop-color="#1e3060"/>
    </linearGradient>
    <filter id="sh10" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#00000030"/>
    </filter>
    <clipPath id="circleClip10">
      <circle cx="128" cy="110" r="82"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" rx="40" fill="url(#bg10)"/>

  <!-- 指紋パターン（同心楕円で表現） -->
  <g opacity="0.18" clip-path="url(#circleClip10)">
    <ellipse cx="128" cy="110" rx="78" ry="72" fill="none" stroke="#3C5A8C" stroke-width="4"/>
    <ellipse cx="128" cy="110" rx="66" ry="60" fill="none" stroke="#3C5A8C" stroke-width="4"/>
    <ellipse cx="128" cy="110" rx="54" ry="48" fill="none" stroke="#3C5A8C" stroke-width="4"/>
    <ellipse cx="128" cy="110" rx="42" ry="36" fill="none" stroke="#3C5A8C" stroke-width="4"/>
    <ellipse cx="128" cy="110" rx="30" ry="24" fill="none" stroke="#3C5A8C" stroke-width="4"/>
    <ellipse cx="128" cy="110" rx="18" ry="12" fill="none" stroke="#3C5A8C" stroke-width="4"/>
    <!-- 分岐（指紋らしさ） -->
    <path d="M50,95 Q60,80 70,95" fill="none" stroke="#3C5A8C" stroke-width="4"/>
    <path d="M200,115 Q210,130 205,145" fill="none" stroke="#3C5A8C" stroke-width="4"/>
  </g>

  <!-- 中央：2枚の重なった写真フレーム -->
  <!-- 後ろの写真 -->
  <rect x="78" y="74" width="76" height="60" rx="9"
        fill="white"
        transform="rotate(-6, 116, 104)"
        filter="url(#sh10)"/>
  <rect x="78" y="74" width="76" height="60" rx="9"
        fill="none" stroke="#8090a8" stroke-width="1.5"
        transform="rotate(-6, 116, 104)"/>

  <!-- 前の写真 -->
  <rect x="102" y="78" width="76" height="60" rx="9" fill="white" filter="url(#sh10)"/>
  <rect x="106" y="82" width="68" height="42" rx="5" fill="url(#photoGrad)"/>
  <!-- 写真内容 -->
  <circle cx="158" cy="96" r="9" fill="#f5c842"/>
  <polygon points="108,120 126,100 144,120" fill="#3C783C"/>
  <polygon points="130,120 150,95 170,120" fill="#4a9a4a" opacity="0.8"/>
  <rect x="102" y="78" width="76" height="60" rx="9" fill="none" stroke="#3C5A8C" stroke-width="2.5"/>

  <!-- ≈ マーク（右下） -->
  <circle cx="192" cy="152" r="20" fill="#3C5A8C" filter="url(#sh10)"/>
  <text x="192" y="159" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white">≈</text>

  <!-- アプリ名 -->
  <text x="128" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#3C5A8C" letter-spacing="4">NIMONO</text>
  <text x="128" y="232" text-anchor="middle" font-family="serif" font-size="12" fill="#3C5A8C" opacity="0.65" letter-spacing="2">似物</text>
</svg>
