<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- コンセプト: 土鍋（どなべ）から湯気が立つ。中に画像サムネイルを並べて「似た画像をまとめる」を表現 -->
  <defs>
    <linearGradient id="bg_n01" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a0a"/>
      <stop offset="100%" stop-color="#1a0e05"/>
    </linearGradient>
    <linearGradient id="nabeBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a6040"/>
      <stop offset="100%" stop-color="#5a3820"/>
    </linearGradient>
    <linearGradient id="nabeLid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a07050"/>
      <stop offset="100%" stop-color="#6a4028"/>
    </linearGradient>
    <linearGradient id="soupColor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c07030"/>
      <stop offset="100%" stop-color="#8a4a10"/>
    </linearGradient>
    <filter id="sh_n01" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#00000080"/>
    </filter>
    <filter id="steamBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" rx="40" fill="url(#bg_n01)"/>

  <!-- 湯気（steam） -->
  <g opacity="0.55" filter="url(#steamBlur)">
    <path d="M90 80 Q85 65 90 52 Q95 40 90 28" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M115 75 Q110 58 115 44 Q120 30 115 18" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M140 75 Q145 58 140 44 Q135 30 140 18" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <path d="M165 80 Q170 65 165 52 Q160 40 165 28" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- 鍋の取っ手（左右） -->
  <ellipse cx="52" cy="148" rx="20" ry="10" fill="url(#nabeBody)" stroke="#3a2010" stroke-width="2"/>
  <ellipse cx="204" cy="148" rx="20" ry="10" fill="url(#nabeBody)" stroke="#3a2010" stroke-width="2"/>

  <!-- 鍋本体 -->
  <path d="M55,100 Q55,200 128,205 Q201,200 201,100 Z"
        fill="url(#nabeBody)" filter="url(#sh_n01)"/>
  <!-- 鍋の光沢 -->
  <path d="M75,110 Q80,105 100,108" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.35"/>

  <!-- 鍋の中身（スープ面） -->
  <ellipse cx="128" cy="100" rx="73" ry="24" fill="url(#soupColor)"/>
  <!-- スープの光沢 -->
  <ellipse cx="110" cy="96" rx="25" ry="6" fill="white" opacity="0.18"/>

  <!-- スープ面に浮かぶ具材（大根・にんじん・こんにゃく） -->
  <!-- 大根（白い丸） -->
  <ellipse cx="98" cy="100" rx="14" ry="9" fill="#f0e8d8" stroke="#c8b898" stroke-width="1.5"/>
  <!-- にんじん（オレンジの丸） -->
  <ellipse cx="128" cy="97" rx="13" ry="8" fill="#e07030" stroke="#c05820" stroke-width="1.5"/>
  <!-- こんにゃく（灰色） -->
  <ellipse cx="158" cy="100" rx="14" ry="9" fill="#a898a8" stroke="#887888" stroke-width="1.5"/>
  <!-- 里芋（小さい白） -->
  <ellipse cx="82" cy="107" rx="8" ry="5" fill="#e8dfc8" stroke="#c0b090" stroke-width="1"/>
  <ellipse cx="170" cy="107" rx="8" ry="5" fill="#e8dfc8" stroke="#c0b090" stroke-width="1"/>

  <!-- 蓋（ふた） -->
  <ellipse cx="128" cy="80" rx="80" ry="22" fill="url(#nabeLid)" filter="url(#sh_n01)"/>
  <!-- 蓋の縁 -->
  <ellipse cx="128" cy="80" rx="80" ry="22" fill="none" stroke="#3a2010" stroke-width="2"/>
  <!-- 蓋のつまみ -->
  <ellipse cx="128" cy="62" rx="14" ry="8" fill="url(#nabeLid)" stroke="#3a2010" stroke-width="1.5"/>
  <!-- 蓋の光沢 -->
  <ellipse cx="105" cy="76" rx="22" ry="6" fill="white" opacity="0.22"/>

  <!-- アプリ名 -->
  <text x="128" y="226" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="4">NIMONO</text>
  <text x="128" y="247" text-anchor="middle" font-family="serif" font-size="13" fill="#e0a860" opacity="0.9" letter-spacing="3">煮物 / 似物</text>
</svg>
