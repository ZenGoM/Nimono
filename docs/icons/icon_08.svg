<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- コンセプト: 重なった写真スタック（重複グループを表現） -->
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3C783C"/>
      <stop offset="100%" stop-color="#1e3c1e"/>
    </linearGradient>
    <filter id="sh8" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#00000050"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" rx="40" fill="url(#bg8)"/>

  <!-- 重なった写真（後ろから） -->
  <!-- 4枚目（一番後ろ） -->
  <rect x="66" y="50" width="130" height="100" rx="10"
        fill="white" opacity="0.4"
        transform="rotate(12, 131, 100)"
        filter="url(#sh8)"/>

  <!-- 3枚目 -->
  <rect x="66" y="50" width="130" height="100" rx="10"
        fill="white" opacity="0.55"
        transform="rotate(7, 131, 100)"
        filter="url(#sh8)"/>

  <!-- 2枚目 -->
  <rect x="66" y="50" width="130" height="100" rx="10"
        fill="white" opacity="0.75"
        transform="rotate(3, 131, 100)"
        filter="url(#sh8)"/>

  <!-- 1枚目（一番前）・内容あり -->
  <rect x="63" y="48" width="130" height="100" rx="10" fill="white" filter="url(#sh8)"/>
  <rect x="63" y="48" width="130" height="100" rx="10" fill="none" stroke="#3C783C" stroke-width="2.5"/>
  <!-- 写真内容 -->
  <rect x="69" y="54" width="118" height="78" rx="6" fill="#c8d8f0"/>
  <!-- 空 -->
  <rect x="69" y="54" width="118" height="40" rx="6" fill="#b8cce8"/>
  <!-- 太陽 -->
  <circle cx="165" cy="74" r="14" fill="#f5c842"/>
  <!-- 山 -->
  <polygon points="74,130 102,94 132,130" fill="#3C783C"/>
  <polygon points="112,130 142,88 172,130" fill="#4aaa4a" opacity="0.85"/>
  <!-- 地面 -->
  <rect x="69" y="120" width="118" height="12" fill="#7aaa4a" opacity="0.6"/>

  <!-- バッジ：グループ枚数 -->
  <circle cx="195" cy="52" r="22" fill="#3C5A8C" filter="url(#sh8)"/>
  <text x="195" y="50" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="white">×4</text>
  <text x="195" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="white" opacity="0.8">枚</text>

  <!-- 下部ラベル -->
  <rect x="63" y="158" width="130" height="28" rx="8" fill="#2a602a"/>
  <text x="128" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="1">類似グループ</text>

  <!-- アプリ名 -->
  <text x="128" y="215" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" letter-spacing="4">NIMONO</text>
  <text x="128" y="236" text-anchor="middle" font-family="serif" font-size="12" fill="white" opacity="0.6" letter-spacing="2">似物</text>
</svg>
