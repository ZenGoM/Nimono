<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- コンセプト: 「N」レターマーク + 内部に画像フレーム2枚 -->
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3C5A8C"/>
      <stop offset="100%" stop-color="#253758"/>
    </linearGradient>
    <linearGradient id="nGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#d0e0ff"/>
      <stop offset="100%" stop-color="#a0b8e8"/>
    </linearGradient>
    <filter id="sh7" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="5" flood-color="#00000040"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" rx="40" fill="url(#bg7)"/>

  <!-- 「N」の文字を大きく中央に -->
  <text x="128" y="168" text-anchor="middle"
        font-family="'Arial Black', 'Impact', sans-serif"
        font-size="170" font-weight="900"
        fill="url(#nGrad)"
        filter="url(#sh7)"
        opacity="0.12">N</text>

  <!-- 太い「N」アウトライン -->
  <!-- Nを手描きで -->
  <path d="M55,190 L55,66 L90,66 L168,158 L168,66 L200,66 L200,190 L165,190 L87,98 L87,190 Z"
        fill="none" stroke="white" stroke-width="3" opacity="0.2"/>
  <path d="M55,190 L55,66 L90,66 L168,158 L168,66 L200,66 L200,190 L165,190 L87,98 L87,190 Z"
        fill="white" opacity="0.06"/>

  <!-- 左の画像フレーム（N内部・左縦棒の中） -->
  <rect x="60" y="90" width="50" height="40" rx="7" fill="white" opacity="0.9" filter="url(#sh7)"/>
  <rect x="64" y="94" width="42" height="28" rx="4" fill="#c8d8f0"/>
  <circle cx="95" cy="104" r="7" fill="#f5c842"/>
  <polygon points="66,119 78,105 90,119" fill="#3C783C"/>
  <rect x="60" y="90" width="50" height="40" rx="7" fill="none" stroke="#3C5A8C" stroke-width="2"/>

  <!-- 右の画像フレーム（N内部・右縦棒の中） -->
  <rect x="146" y="110" width="50" height="40" rx="7" fill="white" opacity="0.9" filter="url(#sh7)"/>
  <rect x="150" y="114" width="42" height="28" rx="4" fill="#c0d0e8"/>
  <circle cx="181" cy="124" r="7" fill="#f5c842"/>
  <polygon points="152,139 164,125 176,139" fill="#3C5A8C"/>
  <rect x="146" y="110" width="50" height="40" rx="7" fill="none" stroke="#3C783C" stroke-width="2"/>

  <!-- 2枚を繋ぐ対角線（≈） -->
  <text x="128" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="white" opacity="0.8">≈</text>

  <!-- アプリ名 -->
  <text x="128" y="216" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="white" opacity="0.9" letter-spacing="5">NIMONO</text>
  <text x="128" y="236" text-anchor="middle" font-family="serif" font-size="12" fill="white" opacity="0.55" letter-spacing="2">似物</text>
</svg>
