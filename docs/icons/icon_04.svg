<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- コンセプト: 虫眼鏡で重複画像を発見 -->
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f4fb"/>
      <stop offset="100%" stop-color="#d8e0f0"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8cef8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#8aaae0" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="sh4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="5" stdDeviation="6" flood-color="#00000025"/>
    </filter>
    <clipPath id="lensClip">
      <circle cx="105" cy="105" r="58"/>
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" rx="40" fill="url(#bg4)"/>

  <!-- 背景の画像フレーム群（グループ）-->
  <rect x="16" y="30" width="55" height="44" rx="6" fill="white" stroke="#c0c8d8" stroke-width="1.5" filter="url(#sh4)"/>
  <rect x="22" y="36" width="43" height="30" rx="3" fill="#c8d8f0"/>
  <circle cx="54" cy="46" r="6" fill="#f5c842"/>
  <polygon points="24,62 38,48 54,62" fill="#3C783C" opacity="0.7"/>

  <rect x="80" y="22" width="55" height="44" rx="6" fill="white" stroke="#c0c8d8" stroke-width="1.5" filter="url(#sh4)"/>
  <rect x="86" y="28" width="43" height="30" rx="3" fill="#d0e8d0"/>
  <circle cx="118" cy="38" r="6" fill="#f5c842"/>
  <polygon points="88,54 102,40 118,54" fill="#3C783C" opacity="0.7"/>

  <rect x="145" y="30" width="55" height="44" rx="6" fill="white" stroke="#c0c8d8" stroke-width="1.5" filter="url(#sh4)"/>
  <rect x="151" y="36" width="43" height="30" rx="3" fill="#f0d8c8"/>
  <circle cx="183" cy="46" r="6" fill="#e08030"/>
  <polygon points="153,62 167,48 183,62" fill="#804020" opacity="0.7"/>

  <!-- 虫眼鏡レンズ内（拡大された類似画像ペア） -->
  <circle cx="105" cy="105" r="60" fill="white" filter="url(#sh4)"/>
  <circle cx="105" cy="105" r="58" fill="url(#lens)"/>

  <!-- レンズ内：2枚の類似画像 -->
  <g clip-path="url(#lensClip)">
    <rect x="55" y="75" width="45" height="36" rx="5" fill="white"/>
    <rect x="58" y="78" width="39" height="25" rx="3" fill="#c8d8f0"/>
    <circle cx="85" cy="87" r="6" fill="#f5c842"/>
    <polygon points="60,100 72,87 85,100" fill="#3C783C"/>

    <rect x="110" y="75" width="45" height="36" rx="5" fill="white"/>
    <rect x="113" y="78" width="39" height="25" rx="3" fill="#c0d0e8"/>
    <circle cx="138" cy="87" r="6" fill="#f5c842"/>
    <polygon points="115,100 127,87 140,100" fill="#3C783C"/>

    <!-- 類似度パーセント -->
    <text x="105" y="125" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#3C5A8C">92%</text>
  </g>

  <!-- 虫眼鏡外枠 -->
  <circle cx="105" cy="105" r="60" fill="none" stroke="#3C5A8C" stroke-width="6"/>
  <!-- 虫眼鏡の柄 -->
  <line x1="150" y1="150" x2="200" y2="200" stroke="#3C5A8C" stroke-width="14" stroke-linecap="round"/>
  <line x1="150" y1="150" x2="200" y2="200" stroke="#5a7ab0" stroke-width="8" stroke-linecap="round"/>

  <!-- アプリ名 -->
  <text x="128" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#3C5A8C" letter-spacing="4">NIMONO</text>
  <text x="128" y="248" text-anchor="middle" font-family="serif" font-size="11" fill="#3C5A8C" opacity="0.6" letter-spacing="2">似物</text>
</svg>
