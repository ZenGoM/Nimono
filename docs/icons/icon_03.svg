<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- コンセプト: 漢字「似」をメインモチーフに -->
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3C5A8C"/>
      <stop offset="100%" stop-color="#1e2d46"/>
    </linearGradient>
    <linearGradient id="kanjiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c0d0f0"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" rx="40" fill="url(#bg3)"/>

  <!-- 装飾的な円弧 -->
  <circle cx="128" cy="128" r="100" fill="none" stroke="white" stroke-width="1" opacity="0.15"/>
  <circle cx="128" cy="128" r="80" fill="none" stroke="white" stroke-width="1" opacity="0.10"/>

  <!-- 漢字「似」 大きく中央に -->
  <text x="128" y="160" text-anchor="middle"
        font-family="'Yu Mincho', '游明朝', 'Noto Serif JP', serif"
        font-size="120" font-weight="700"
        fill="url(#kanjiGrad)"
        filter="url(#glow3)">似</text>

  <!-- 上部アクセント：2枚の小さな画像アイコン -->
  <rect x="70" y="30" width="38" height="28" rx="5" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="70" y1="48" x2="108" y2="48" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <circle cx="100" cy="40" r="5" fill="#f5c842" opacity="0.8"/>

  <rect x="148" y="30" width="38" height="28" rx="5" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
  <line x1="148" y1="48" x2="186" y2="48" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <circle cx="178" cy="40" r="5" fill="#f5c842" opacity="0.8"/>

  <!-- 2アイコン間の繋がり線 -->
  <line x1="108" y1="44" x2="148" y2="44" stroke="white" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- アプリ名 -->
  <text x="128" y="210" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="white" opacity="0.9" letter-spacing="5">NIMONO</text>
  <text x="128" y="232" text-anchor="middle" font-family="serif" font-size="12" fill="white" opacity="0.55" letter-spacing="3">画像類似グルーピング</text>
</svg>
