<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- コンセプト: ベン図（2枚の画像の重なりが「似ている」部分） -->
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="100%" stop-color="#0e1a30"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="leftCircle">
      <circle cx="100" cy="110" r="62"/>
    </clipPath>
    <clipPath id="rightCircle">
      <circle cx="156" cy="110" r="62"/>
    </clipPath>
    <mask id="intersection">
      <circle cx="100" cy="110" r="62" fill="white"/>
      <circle cx="156" cy="110" r="62" fill="white"/>
    </mask>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" rx="40" fill="url(#bg5)"/>

  <!-- 左円（青） -->
  <circle cx="100" cy="110" r="62" fill="#3C5A8C" opacity="0.75"/>
  <!-- 左円内の画像表現 -->
  <g clip-path="url(#leftCircle)">
    <rect x="54" y="80" width="36" height="28" rx="4" fill="white" opacity="0.3"/>
    <circle cx="82" cy="90" r="6" fill="#f5c842" opacity="0.6"/>
    <text x="72" y="130" text-anchor="middle" font-family="serif" font-size="11" fill="white" opacity="0.7">photo</text>
    <text x="72" y="145" text-anchor="middle" font-family="serif" font-size="11" fill="white" opacity="0.7">001</text>
  </g>

  <!-- 右円（緑） -->
  <circle cx="156" cy="110" r="62" fill="#3C783C" opacity="0.75"/>
  <!-- 右円内の画像表現 -->
  <g clip-path="url(#rightCircle)">
    <rect x="168" y="80" width="36" height="28" rx="4" fill="white" opacity="0.3"/>
    <circle cx="196" cy="90" r="6" fill="#f5c842" opacity="0.6"/>
    <text x="184" y="130" text-anchor="middle" font-family="serif" font-size="11" fill="white" opacity="0.7">photo</text>
    <text x="184" y="145" text-anchor="middle" font-family="serif" font-size="11" fill="white" opacity="0.7">002</text>
  </g>

  <!-- 交差部分（強調） -->
  <path d="M128,51 A62,62 0 0,1 128,169 A62,62 0 0,1 128,51 Z" fill="none"/>
  <!-- 交差を近似で描く -->
  <path d="
    M128,51
    A62,62 0 0,1 156,172
    A62,62 0 0,1 100,172
    A62,62 0 0,1 128,51
  " fill="white" opacity="0.18" filter="url(#glow5)"/>

  <!-- 交差中央のマーク -->
  <text x="128" y="116" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="white" filter="url(#glow5)" opacity="0.95">≈</text>

  <!-- 枠線 -->
  <circle cx="100" cy="110" r="62" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <circle cx="156" cy="110" r="62" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>

  <!-- アプリ名 -->
  <text x="128" y="208" text-anchor="middle" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="white" letter-spacing="4">NIMONO</text>
  <text x="128" y="230" text-anchor="middle" font-family="serif" font-size="13" fill="white" opacity="0.6" letter-spacing="2">似物</text>
</svg>
