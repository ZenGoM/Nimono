<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- 鍋の横面図、ふたが開いて画像サムネイルがグループになって浮かび上がる。具材：大根・豆腐・ネギ -->
  <defs>
    <linearGradient id="bg_n03" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f2e8"/>
      <stop offset="100%" stop-color="#e0d4b8"/>
    </linearGradient>
    <linearGradient id="nabeBody3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c08050"/>
      <stop offset="100%" stop-color="#7a4020"/>
    </linearGradient>
    <linearGradient id="nabeLid3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d09060"/>
      <stop offset="100%" stop-color="#906030"/>
    </linearGradient>
    <linearGradient id="soup3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8782a"/>
      <stop offset="100%" stop-color="#8a4010"/>
    </linearGradient>
    <filter id="sh_n03" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="2" dy="3" stdDeviation="5" flood-color="#00000035"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="256" height="256" rx="40" fill="url(#bg_n03)"/>

  <!-- ====== 鍋（正面図）====== -->
  <!-- 取っ手（左右） -->
  <path d="M38,142 Q28,142 25,152 Q22,162 30,166 L50,166" fill="none" stroke="#a06030" stroke-width="10" stroke-linecap="round"/>
  <path d="M218,142 Q228,142 231,152 Q234,162 226,166 L206,166" fill="none" stroke="#a06030" stroke-width="10" stroke-linecap="round"/>

  <!-- 鍋本体 -->
  <rect x="45" y="132" width="166" height="82" rx="18" fill="url(#nabeBody3)" filter="url(#sh_n03)"/>
  <!-- 鍋の側面光沢 -->
  <rect x="52" y="140" width="16" height="56" rx="7" fill="white" opacity="0.15"/>

  <!-- スープ表面（鍋の口の内側が見える）-->
  <rect x="56" y="132" width="144" height="50" rx="8" fill="url(#soup3)"/>
  <!-- スープ光沢 -->
  <ellipse cx="108" cy="143" rx="26" ry="7" fill="white" opacity="0.18"/>

  <!-- ====== 具材（スープ面に浮かぶ）====== -->

  <!-- ── 大根の輪切り（左） ── -->
  <!-- 大根: 白い円形断面に同心円の繊維模様 -->
  <g transform="translate(85, 156)">
    <!-- 外側（皮） -->
    <ellipse rx="22" ry="15" fill="#ecebe0" stroke="#b8b098" stroke-width="2.5"/>
    <!-- 年輪1 -->
    <ellipse rx="16" ry="11" fill="none" stroke="#d0ccb0" stroke-width="1.3"/>
    <!-- 年輪2 -->
    <ellipse rx="10" ry="7" fill="none" stroke="#d0ccb0" stroke-width="1.3"/>
    <!-- 年輪3 -->
    <ellipse rx="5" ry="3.5" fill="none" stroke="#d0ccb0" stroke-width="1.3"/>
    <!-- 中心 -->
    <ellipse rx="2" ry="1.5" fill="#c0b898"/>
    <!-- 放射状の維管束（薄く） -->
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#d0ccb0" stroke-width="0.7" opacity="0.6"/>
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#d0ccb0" stroke-width="0.7" opacity="0.6"/>
    <line x1="-16" y1="-11" x2="16" y2="11" stroke="#d0ccb0" stroke-width="0.5" opacity="0.4"/>
    <line x1="16" y1="-11" x2="-16" y2="11" stroke="#d0ccb0" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- ── 豆腐（中央）── -->
  <!-- 豆腐: 白いブロック、碁盤目の切れ目 -->
  <g transform="translate(133, 153)">
    <!-- 豆腐の側面（厚みを表す） -->
    <rect x="-20" y="14" width="40" height="8" rx="2" fill="#d8d5b8"/>
    <!-- 豆腐の上面 -->
    <rect x="-22" y="-16" width="44" height="30" rx="4" fill="#f5f2df" stroke="#c8c4a0" stroke-width="2"/>
    <!-- 縦切れ目 -->
    <line x1="-7" y1="-16" x2="-7" y2="14" stroke="#e0dcc5" stroke-width="1.2"/>
    <line x1="8" y1="-16" x2="8" y2="14" stroke="#e0dcc5" stroke-width="1.2"/>
    <!-- 横切れ目 -->
    <line x1="-22" y1="0" x2="22" y2="0" stroke="#e0dcc5" stroke-width="1.2"/>
    <!-- 豆腐らしい柔らかさ（角が少し丸い）は rx=4で表現済 -->
  </g>

  <!-- ── ネギの斜め切り（右）── -->
  <!-- ネギ: 暗緑〜明緑の同心楕円（斜め切り断面の年輪模様） -->
  <!-- 大きめの1切れ -->
  <g transform="translate(182, 152)">
    <!-- 外皮（濃い緑） -->
    <ellipse rx="16" ry="11" fill="#1c5a08" stroke="#0e3804" stroke-width="2"/>
    <!-- 2層目 -->
    <ellipse rx="12" ry="8" fill="#2a7a10" stroke="none"/>
    <!-- 3層目 -->
    <ellipse rx="8" ry="5.5" fill="#38a018" stroke="none"/>
    <!-- 4層目 -->
    <ellipse rx="5" ry="3.5" fill="#50c020" stroke="none"/>
    <!-- 5層目 -->
    <ellipse rx="2.5" ry="1.8" fill="#78d840" stroke="none"/>
    <!-- 中心の白い芯 -->
    <ellipse rx="1" ry="0.7" fill="#e8f8d0" stroke="none"/>
  </g>
  <!-- 小さい1切れ（右下にずらして2個感） -->
  <g transform="translate(193, 164)">
    <ellipse rx="11" ry="7.5" fill="#1c5a08" stroke="#0e3804" stroke-width="1.5"/>
    <ellipse rx="8" ry="5.5" fill="#2a7a10" stroke="none"/>
    <ellipse rx="5" ry="3.5" fill="#38a018" stroke="none"/>
    <ellipse rx="2.5" ry="1.8" fill="#50c020" stroke="none"/>
    <ellipse rx="1" ry="0.7" fill="#78d840" stroke="none"/>
  </g>

  <!-- 鍋の縁線 -->
  <rect x="45" y="132" width="166" height="82" rx="18" fill="none" stroke="#5a3010" stroke-width="2.5"/>

  <!-- ====== ふた（斜め浮き上がり）====== -->
  <g transform="rotate(-18, 128, 118)">
    <ellipse cx="128" cy="118" rx="88" ry="16" fill="url(#nabeLid3)" filter="url(#sh_n03)"/>
    <ellipse cx="128" cy="118" rx="88" ry="16" fill="none" stroke="#5a3010" stroke-width="2"/>
    <!-- ふたのつまみ -->
    <ellipse cx="128" cy="106" rx="14" ry="7" fill="url(#nabeLid3)" stroke="#5a3010" stroke-width="1.5"/>
    <!-- ふたの光沢 -->
    <ellipse cx="108" cy="115" rx="20" ry="5" fill="white" opacity="0.25"/>
  </g>

  <!-- ====== 湯気 ====== -->
  <path d="M100,98 Q95,80 100,66" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <path d="M128,90 Q123,72 128,58" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <path d="M156,98 Q161,80 156,66" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

  <!-- ====== ふたから浮かび上がる画像サムネイル（類似グループ） ====== -->
  <!-- 左（傾き） -->
  <rect x="60" y="42" width="44" height="34" rx="6" fill="white" filter="url(#sh_n03)" transform="rotate(-8, 82, 59)"/>
  <rect x="63" y="45" width="38" height="24" rx="4" fill="#c8d8f0" transform="rotate(-8, 82, 59)"/>
  <circle cx="91" cy="53" r="6" fill="#f5c842" transform="rotate(-8, 82, 59)"/>
  <polygon points="65,65 76,53 87,65" fill="#3C783C" transform="rotate(-8, 82, 59)"/>

  <!-- 中央 -->
  <rect x="106" y="28" width="44" height="34" rx="6" fill="white" filter="url(#sh_n03)"/>
  <rect x="109" y="31" width="38" height="24" rx="4" fill="#c0d0e8"/>
  <circle cx="137" cy="39" r="6" fill="#f5c842"/>
  <polygon points="111,51 122,39 133,51" fill="#3C5A8C"/>

  <!-- 右（傾き） -->
  <rect x="152" y="42" width="44" height="34" rx="6" fill="white" filter="url(#sh_n03)" transform="rotate(8, 174, 59)"/>
  <rect x="155" y="45" width="38" height="24" rx="4" fill="#c8d8f0" transform="rotate(8, 174, 59)"/>
  <circle cx="183" cy="53" r="6" fill="#f5c842" transform="rotate(8, 174, 59)"/>
  <polygon points="157,65 168,53 179,65" fill="#3C783C" transform="rotate(8, 174, 59)"/>

  <!-- アプリ名 -->
  <text x="128" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#5a3010" letter-spacing="4">NIMONO</text>
</svg>
